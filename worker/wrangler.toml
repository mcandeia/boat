name = "mu-patos"
main = "src/index.ts"
compatibility_date = "2026-04-01"

# Plain fetch() with the right Chrome client-hint headers gets through
# mupatos.com.br's bot guard, so we no longer need Browser Rendering.

# ---------------------------------------------------------------------------
# Cron — every minute, but now ONLY for the global server-events tick.
# Per-character polling moved to Durable Object alarms (CharWatcher).
# ---------------------------------------------------------------------------

[triggers]
crons = ["* * * * *"]

# ---------------------------------------------------------------------------
# Durable Objects — one CharWatcher instance per character, each with its
# own 60s alarm. Replaces the single-cron fan-out that kept tipping over
# the per-tick CPU budget once we had ~25+ chars.
# ---------------------------------------------------------------------------

[[durable_objects.bindings]]
name       = "CHAR_WATCHERS"
class_name = "CharWatcher"

[[migrations]]
tag         = "v1-do"
new_classes = ["CharWatcher"]

# ---------------------------------------------------------------------------
# Observability — surfaces console.log + errors + cron runs in the
# Cloudflare dashboard ("Workers & Pages > mu-patos > Logs"). Replaces
# the need for `wrangler tail` for after-the-fact diagnosis.
# ---------------------------------------------------------------------------

[observability]
enabled = true

# ---------------------------------------------------------------------------
# Plain (non-secret) variables.
# ---------------------------------------------------------------------------

[vars]
PROFILE_BASE_URL         = "https://mupatos.com.br/site/profile/character"
LOGIN_TOKEN_TTL_SECONDS  = "600"        # 10 minutes for deep-link auth
SESSION_TTL_DAYS         = "30"
COOLDOWN_SECONDS         = "3600"       # don't re-fire the same alert within 1h
COOKIE_NAME              = "mlw_sess"

# Telegram. TELEGRAM_BOT_TOKEN + TELEGRAM_WEBHOOK_SECRET are GH Action secrets.
TELEGRAM_BOT_USERNAME    = "mu_patos_bot"

# ---------------------------------------------------------------------------
# Storage. Top-level fields above must come before any [[section]] in TOML.
# ---------------------------------------------------------------------------

[[d1_databases]]
binding        = "DB"
database_name  = "mu-watcher"
database_id    = "d9cae699-cfd1-44d7-b9b7-85fa5de4fcef"
migrations_dir = "migrations"
