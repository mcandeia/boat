name = "mu-level-watcher"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# ---------------------------------------------------------------------------
# Cloudflare Browser Rendering — needed because mupatos.com.br blocks
# raw fetch() requests with a 403; only a real Chromium gets through.
# ---------------------------------------------------------------------------

browser = { binding = "BROWSER" }

# ---------------------------------------------------------------------------
# Cron — poll every 5 minutes.
# ---------------------------------------------------------------------------

[triggers]
crons = ["*/5 * * * *"]

# ---------------------------------------------------------------------------
# Plain (non-secret) variables.
# ---------------------------------------------------------------------------

[vars]
PROFILE_BASE_URL         = "https://mupatos.com.br/site/profile/character"
LOGIN_TOKEN_TTL_SECONDS  = "600"        # 10 minutes for deep-link auth
SESSION_TTL_DAYS         = "30"
COOLDOWN_SECONDS         = "21600"      # don't re-fire the same alert within 6h
COOKIE_NAME              = "mlw_sess"

# Telegram. TELEGRAM_BOT_TOKEN + TELEGRAM_WEBHOOK_SECRET are GH Action secrets.
TELEGRAM_BOT_USERNAME    = "mu_patos_bot"

# ---------------------------------------------------------------------------
# Storage. Top-level fields above must come before any [[section]] in TOML.
# ---------------------------------------------------------------------------

[[d1_databases]]
binding        = "DB"
database_name  = "mu-watcher"
database_id    = "d9cae699-cfd1-44d7-b9b7-85fa5de4fcef"
migrations_dir = "migrations"
