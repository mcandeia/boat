name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install
        run: cd worker && npm install --no-audit --no-fund

      - name: Typecheck
        run: cd worker && npx tsc --noEmit

      # Catches the silent template-literal-strips-backslashes class of
      # bugs that tsc can't see — INDEX_HTML is just a string at type-
      # check time, but the browser parses its inline JS and crashes if
      # any of it is invalid. check-ui runs the served scripts through
      # `new Function(...)` to fail the build the same way.
      - name: Check served UI scripts parse
        run: cd worker && node scripts/check-ui.mjs

      # D1 migrations are idempotent and safe to re-run on every deploy.
      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: d1 migrations apply mu-watcher --remote

      # Push secrets into the Worker, then deploy. wrangler-action takes the
      # `secrets:` block, reads each name from the env: below, and runs
      # `wrangler secret bulk` before the deploy command.
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy
          secrets: |
            SESSION_SECRET
            TELEGRAM_BOT_TOKEN
            TELEGRAM_WEBHOOK_SECRET
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}

      # Idempotent: tells Telegram to deliver bot updates to our worker URL.
      # secret_token gets included in X-Telegram-Bot-Api-Secret-Token on every
      # delivery; the webhook handler verifies it.
      - name: Register Telegram webhook
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/setWebhook" \
            -H "content-type: application/json" \
            -d '{
              "url": "https://mu-patos.mcandeia.workers.dev/api/telegram/webhook",
              "secret_token": "${{ secrets.TELEGRAM_WEBHOOK_SECRET }}",
              "allowed_updates": ["message"]
            }' | jq -e '.ok == true'
